 "canopy_cover_10m": 1.0, "Continuouness for fish / mzb": "yes", "Special bed structures Bonus": "few / slight", "Passability": "very well", "Accessibility": "hardly", "building_distance_mean_m_class": "medium", "impervious_cover_50m_class": "very low", "slowmobility_length_m_50m_class": "low", "poi_total_50m_class": "very low", "canopy_cover_10m_class": "very high"}, "geometry": {"type": "LineString", "coordinates": [[17.374552934447053, 48.68233006215751], [17.374584352341763, 48.68232985204715], [17.374715645847385, 48.682333055838896], [17.374824824351915, 48.68233895794395], [17.37486473761965, 48.68234323090331], [17.37494092149, 48.68235287115594], [17.3750293785959, 48.6823616466513], [17.375129349647104, 48.68236977687178], [17.375227571685716, 48.68237491651817]]}}, {"type": "Feature", "properties": {"section_id": 14, "stream_name": "Teplica", "building_distance_mean_m": 84.92592555492017, "bench_count_50m": 0, "impervious_cover_50m": 2.7142857142857153, "slowmobility_length_m_50m": 254.38143110419125, "bench_count_50m_class": "very low", "poi_total_50m": 1, "canopy_cover_10m": 1.0, "Continuouness for fish / mzb": "yes", "Special bed structures Bonus": "few / slight", "Passability": "very well", "Accessibility": "hardly", "building_distance_mean_m_class": "high", "impervious_cover_50m_class": "very low", "slowmobility_length_m_50m_class": "low", "poi_total_50m_class": "low", "canopy_cover_10m_class": "very high"}, "geometry": {"type": "LineString", "coordinates": [[17.375227571685716, 48.68237491651817], [17.375232732982045, 48.68237518659002], [17.375300892888138, 48.68237785745318], [17.375378000692265, 48.68237932443849], [17.37551661824762, 48.68237952234769], [17.37554282719416, 48.68237877776582], [17.375613333410314, 48.68237243072541], [17.375713442047115, 48.68235894971665], [17.37574392857009, 48.682352612933634], [17.375794992300992, 48.682343609227445], [17.375862241722267, 48.68232693298859], [17.375893245329944, 48.68231824349575]]}}, {"type": "Feature", "properties": {"section_id": 15, "stream_name": "Teplica", "building_distance_mean_m": 84.24555689936815, "bench_count_50m": 0, "impervious_cover_50m": 7.867924528301879, "slowmobility_length_m_50m": 236.33308949544778, "bench_count_50m_class": "very low", "poi_total_50m": 1, "canopy_cover_10m": 0.9230769230769231, "Continuouness for fish / mzb": "yes", "Special bed structures Bonus": "none", "Passability": "very well", "Accessibility": "well", "building_distance_mean_m_class": "high", "impervious_cover_50m_class": "very low", "slowmobility_length_m_50m_class": "low", "poi_total_50m_class": "low", "canopy_cover_10m_class": "very high"}, "geometry": {"type": "LineString", "coordinates": [[17.375893245329944, 48.68231824349575], [17.375911311778356, 48.682313179941964], [17.37605366289318, 48.68227660752739], [17.376157376970998, 48.68224980160998], [17.376204183393167, 48.68223701246827], [17.376231137771164, 48.68223085037408]]}}]};
    const valueSpecs = [["building_distance_mean_m", "building_distance_mean_m_class"], ["bench_count_50m", "bench_count_50m_class"], ["impervious_cover_50m", "impervious_cover_50m_class"], ["slowmobility_length_m_50m", "slowmobility_length_m_50m_class"], ["poi_total_50m", "poi_total_50m_class"], ["canopy_cover_10m", "canopy_cover_10m_class"]];
    const categoricalSpecs = ["Continuouness for fish / mzb", "Special bed structures Bonus", "Passability", "Accessibility"];
    const classColors = {"very low": "#d73027", "low": "#fc8d59", "medium": "#fee08b", "high": "#91cf60", "very high": "#1a9850"};
    const categoryPalettes = {"Continuouness for fish / mzb": {"yes": "#1a9850", "no": "#d73027"}, "Special bed structures Bonus": {"none": "#d9d9d9", "few / slight": "#fdae61", "many": "#1a9850"}, "Passability": {"not possible": "#d73027", "limited": "#fc8d59", "medium": "#fee08b", "well": "#91cf60", "very well": "#1a9850"}, "Accessibility": {"hardly": "#d73027", "medium": "#fee08b", "well": "#91cf60"}};
    const orderedClasses = ['very low', 'low', 'medium', 'high', 'very high'];

    const map = L.map('map');
    const osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    });
    const positron = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd',
      maxZoom: 20,
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
    }).addTo(map);
    const esri = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 19,
      attribution: 'Tiles &copy; Esri'
    });

    const overlays = {};
    const overlayLayers = {};
    const overlayLegends = {};
    let firstLayer = null;
    let activeOverlayName = null;

    function safeText(value) {
      if (value === null || value === undefined || value === '') return 'NA';
      return String(value);
    }

    function safeNumber(value) {
      if (value === null || value === undefined || value === '') return null;
      const num = Number(value);
      return Number.isFinite(num) ? num : null;
    }

    function formatNumber(value) {
      const num = safeNumber(value);
      if (num === null) return 'NA';
      return num.toFixed(2).replace(/\.00$/, '');
    }

    function buildValueLegendHtml(valueCol, classCol) {
      let html = `<b>${valueCol}</b><br>`;
      orderedClasses.forEach((cls) => {
        const color = classColors[cls] || '#bdbdbd';
        const values = baseData.features
          .filter((feature) => safeText(feature.properties[classCol]).toLowerCase() === cls)
          .map((feature) => safeNumber(feature.properties[valueCol]))
          .filter((value) => value !== null);
        if (!values.length) {
          html += `<i style="background:${color}"></i>${cls}<br>`;
          return;
        }
        html += `<i style="background:${color}"></i>${cls}: ${formatNumber(Math.min(...values))} - ${formatNumber(Math.max(...values))}<br>`;
      });
      return html;
    }

    function buildCategoryLegendHtml(col, palette) {
      let html = `<b>${col}</b><br>`;
      Object.entries(palette).forEach(([label, color]) => {
        html += `<i style="background:${color}"></i>${label}<br>`;
      });
      return html;
    }

    function lineLayer(features, colorFn, tooltipFn) {
      return L.geoJSON(features, {
        style: (feature) => ({
          color: colorFn(feature),
          weight: 4,
          opacity: 0.95
        }),
        onEachFeature: (feature, layer) => {
          layer.bindTooltip(tooltipFn(feature), {sticky: true});
        }
      });
    }

    valueSpecs.forEach((spec, idx) => {
      const valueCol = spec[0];
      const classCol = spec[1];
      const layer = lineLayer(
        baseData,
        (feature) => classColors[safeText(feature.properties[classCol]).toLowerCase()] || '#bdbdbd',
        (feature) => {
          const p = feature.properties;
          return `
            <b>section_id</b>: ${safeText(p.section_id)}<br>
            <b>stream_name</b>: ${safeText(p.stream_name)}<br>
            <b>${valueCol}</b>: ${safeText(p[valueCol])}<br>
            <b>${classCol}</b>: ${safeText(p[classCol])}
          `;
        }
      );
      overlays[valueCol] = layer;
      overlayLayers[valueCol] = layer;
      overlayLegends[valueCol] = buildValueLegendHtml(valueCol, classCol);
      if (idx === 0) {
        layer.addTo(map);
        firstLayer = layer;
        activeOverlayName = valueCol;
      }
    });

    categoricalSpecs.forEach((col) => {
      const palette = categoryPalettes[col] || {};
      const layer = lineLayer(
        baseData,
        (feature) => palette[safeText(feature.properties[col])] || '#bdbdbd',
        (feature) => {
          const p = feature.properties;
          return `
            <b>section_id</b>: ${safeText(p.section_id)}<br>
            <b>stream_name</b>: ${safeText(p.stream_name)}<br>
            <b>${col}</b>: ${safeText(p[col])}
          `;
        }
      );
      overlays[col] = layer;
      overlayLayers[col] = layer;
      overlayLegends[col] = buildCategoryLegendHtml(col, palette);
    });

    const baseMaps = {
      'OpenStreetMap': osm,
      'CartoDB Positron': positron,
      'Esri World Imagery': esri
    };

    L.control.layers(baseMaps, overlays, {collapsed: false}).addTo(map);

    const fitLayer = firstLayer || L.geoJSON(baseData);
    map.fitBounds(fitLayer.getBounds(), {padding: [20, 20]});

    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = overlayLegends[activeOverlayName] || '<b>Legend</b>';
      legend._div = div;
      return div;
    };
    legend.addTo(map);

    function refreshLegend() {
      if (!legend._div) return;
      if (activeOverlayName && overlayLegends[activeOverlayName]) {
        legend._div.innerHTML = overlayLegends[activeOverlayName];
        return;
      }
      const visibleName = Object.keys(overlayLayers).find((name) => map.hasLayer(overlayLayers[name]));
      legend._div.innerHTML = overlayLegends[visibleName] || '<b>Legend</b>';
    }

    map.on('overlayadd', (e) => {
      const match = Object.entries(overlayLayers).find(([, layer]) => layer === e.layer);
      if (match) {
        activeOverlayName = match[0];
        refreshLegend();
      }
    });

    map.on('overlayremove', (e) => {
      const match = Object.entries(overlayLayers).find(([, layer]) => layer === e.layer);
      if (match && activeOverlayName === match[0]) {
        activeOverlayName = null;
        refreshLegend();
      }
    });
  </script>
